name: Refresh Item Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

permissions:
  contents: write

jobs:
  refresh:
    name: Refresh Datacore Catalog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild catalog
        run: pnpm build-item-catalog

      - name: Commit changes (if any)
        run: |
          if git diff --quiet -- catalog/item-catalog.json; then
            echo "No catalog changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog/item-catalog.json
          git commit -m "chore: refresh Datacore item catalog"
          git push
